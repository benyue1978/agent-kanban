services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_kanban}
      POSTGRES_USER: ${POSTGRES_USER:-agent_kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_kanban}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_kanban} -d ${POSTGRES_DB:-agent_kanban}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
