services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_kanban}
      POSTGRES_USER: ${POSTGRES_USER:-agent_kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_kanban}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_kanban} -d ${POSTGRES_DB:-agent_kanban}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_kanban}:${POSTGRES_PASSWORD:-agent_kanban}@postgres:5432/${POSTGRES_DB:-agent_kanban}?schema=public
      PORT: 3000
    ports:
      - "3001:3000"
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      KANBAN_API_URL: http://api:3000
      KANBAN_HUMAN_ACTOR_ID: human-reviewer
    ports:
      - "3000:3000"

volumes:
  postgres-data:
